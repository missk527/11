<!DOCTYPE html>
<html>
<head>
<title>Reading Test - 11+ (T10)</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #eef2f7;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 1050px;
  margin: auto;
  background: white;
  padding: 28px;
  border-radius: 18px;
  box-shadow: 0 5px 16px rgba(0,0,0,0.08);
}
.passage {
  background: #fafafa;
  padding: 22px;
  border-left: 6px solid #1f2937;
  white-space: pre-line;
  line-height: 1.9;
  margin-bottom: 20px;
}
button {
  background: #1f2937;
  color: white;
  padding: 10px 16px;
  margin: 5px;
  border: none;
  cursor: pointer;
  border-radius: 8px;
}
button:hover {
  opacity: 0.92;
}
.correct { color: green; }
.wrong { color: #b91c1c; }
label {
  display: block;
  margin: 8px 0;
}
.meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 12px;
}
.small {
  color: #475569;
  font-size: 14px;
}
.note {
  color: #334155;
  font-size: 13px;
  margin-top: 4px;
  margin-bottom: 14px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Reading Test (11+) — T10</h1>

  <div class="meta">
    <div id="timer"></div>
    <div class="small">3 passages • 20 questions each • 60 questions total</div>
  </div>

  <div class="note">
    T10 introduces denser argument, abstract reasoning, subtle inference, and competing interpretations.
  </div>

  <div id="passage" class="passage"></div>
  <div id="q"></div>

  <button onclick="prev()">Previous</button>
  <button onclick="next()">Next</button>
  <button onclick="submitTest()">Submit</button>

  <div id="score"></div>
  <div id="review"></div>
</div>

<script>

const data = [

{
 title: "Passage 1",
 text: `People often describe memory as though it were a storage system that preserves experiences intact until they are retrieved. Contemporary research, however, suggests that remembering is less like replaying a recording and more like reconstructing a scene from fragments. Each act of recollection involves interpretation. Details may be emphasised, omitted, or reorganised according to present concerns, emotional states, and later experiences.

 This does not imply that memory is worthless or entirely unreliable. In ordinary life, recollection is sufficiently stable for communication, planning, and personal continuity. Yet the fact that memory is reconstructive rather than mechanical has important consequences. Confidence in a memory does not necessarily correspond to its accuracy, and repeated retelling may strengthen conviction even when distortions accumulate.

 The social dimension of memory complicates matters further. Families, institutions, and nations all participate in shaping what is remembered and what is forgotten. Public ceremonies, archives, monuments, and narratives do not simply preserve the past; they organise it into forms that support particular identities and values. As a result, disputes about memory are often simultaneously disputes about authority, belonging, and interpretation.`,

 questions: [
 {q:"What is the central argument of the passage?",options:["Memory perfectly preserves experiences","Memory is reconstructive and shaped by interpretation","Emotion destroys all memories","Only institutions shape memory"],answer:1},
 {q:"How does the passage describe remembering?",options:["As replaying an exact recording","As reconstructing from fragments","As deleting unnecessary information","As purely emotional reasoning"],answer:1},
 {q:"What can influence recollection according to the author?",options:["Present concerns and emotional states","Only childhood experiences","Only written records","Weather conditions alone"],answer:0},
 {q:"Why does the author say memory is not worthless?",options:["Because it is always accurate","Because it remains useful for ordinary life","Because science cannot study it","Because all memories are shared"],answer:1},
 {q:"What does the passage suggest about confidence in memory?",options:["Confidence guarantees accuracy","Confidence and accuracy may differ","Confidence weakens memory","Confidence matters only in public ceremonies"],answer:1},
 {q:"What may repeated retelling do?",options:["Erase memories entirely","Strengthen conviction despite distortion","Prevent interpretation","Guarantee objectivity"],answer:1},
 {q:"What is meant by the social dimension of memory?",options:["Memory exists only in groups","Communities influence what is remembered","Only governments create memory","Social media replaces memory"],answer:1},
 {q:"Which institutions are mentioned explicitly?",options:["Hospitals and courts","Families, institutions, and nations","Libraries alone","Universities only"],answer:1},
 {q:"What role do monuments and ceremonies play?",options:["They organise the past into meaningful forms","They prevent all disagreement","They replace memory completely","They erase identity"],answer:0},
 {q:"According to the passage, disputes about memory are often disputes about:",options:["Technology","Authority and interpretation","Geography","Language learning"],answer:1},
 {q:"The tone of the passage is best described as:",options:["Analytical","Humorous","Hostile","Romantic"],answer:0},
 {q:"What does the passage imply about objectivity in memory?",options:["It is automatic","It may be limited by interpretation","It depends entirely on age","It is impossible to discuss"],answer:1},
 {q:"Why are narratives mentioned near the end?",options:["To show how societies shape understanding of the past","To criticise storytelling","To explain literature classes","To dismiss archives"],answer:0},
 {q:"Which statement would the author most likely support?",options:["All memories are false","Remembering involves reconstruction","Emotion should be removed from memory","Only written records matter"],answer:1},
 {q:"What broader issue does the passage address?",options:["How societies interpret the past","How machines store data","How weather affects emotion","How children learn language"],answer:0},
 {q:"Why might two people remember the same event differently?",options:["Because memory is interpretive","Because events change over time","Because language is impossible","Because one person is always lying"],answer:0},
 {q:"Which title best fits the passage?",options:["The Failure of Memory","Memory, Reconstruction, and Identity","Why Records Matter More Than Experience","Emotion and Technology"],answer:1},
 {q:"What is implied about forgetting?",options:["It can be socially shaped","It never occurs naturally","It is always harmful","It only affects nations"],answer:0},
 {q:"What relationship does the author suggest between memory and identity?",options:["They are unrelated","Memory helps support identities and values","Identity prevents memory","Identity depends only on biology"],answer:1},
 {q:"Which summary is most accurate?",options:["The passage argues memory is entirely unreliable","The passage explains that memory is reconstructive, socially shaped, and connected to identity","The passage claims monuments create false history","The passage rejects all forms of recollection"],answer:1}
 ]
},

{
 title: "Passage 2",
 text: `Economic discussions frequently assume that competition automatically produces innovation. Certainly, rivalry can encourage organisations to improve efficiency, reduce costs, and develop new products. Yet historians of technology note that many major advances emerged not from competition alone but from cooperation, public investment, and the sharing of knowledge across institutions.

 Scientific progress often depends upon conditions that are difficult to measure through immediate market outcomes. Researchers may spend years investigating questions with no guarantee of commercial success, and discoveries in one field can unexpectedly transform another decades later. If all activity is judged exclusively by short-term profitability, forms of inquiry whose value is indirect or delayed may struggle to survive.

 This tension does not mean that markets are unimportant. Rather, it suggests that innovation ecosystems rely upon a balance between competition and collective support. Excessive centralisation can suppress experimentation, but systems organised entirely around immediate incentives may also discourage the patience and risk necessary for fundamental discovery.`,

 questions: [
 {q:"What is the main argument of the passage?",options:["Competition is harmful","Innovation depends on more than competition alone","Markets prevent discovery","Public investment eliminates risk"],answer:1},
 {q:"What additional factors besides competition are mentioned?",options:["Cooperation and public investment","Advertising and taxation","Transport and geography","Tourism and entertainment"],answer:0},
 {q:"Why are historians of technology mentioned?",options:["To support the claim about innovation","To criticise science","To reject economics","To explain government policy"],answer:0},
 {q:"What challenge does scientific research often involve?",options:["Guaranteed profits","Long periods without commercial success","Immediate public approval","Elimination of uncertainty"],answer:1},
 {q:"What may happen if all activity is judged by short-term profitability?",options:["Innovation becomes faster","Indirect forms of inquiry may disappear","Markets become stronger","Science becomes easier"],answer:1},
 {q:"What does the passage imply about discoveries?",options:["They always have immediate uses","They can influence unrelated fields later","They only matter commercially","They are fully predictable"],answer:1},
 {q:"What is meant by an innovation ecosystem?",options:["A biological environment","A system supporting discovery and development","A computer network","A scientific laboratory"],answer:1},
 {q:"Why can excessive centralisation be problematic?",options:["It can suppress experimentation","It always causes economic collapse","It removes cooperation","It increases profitability"],answer:0},
 {q:"What risk exists in systems focused entirely on immediate incentives?",options:["They may discourage patience and risk-taking","They eliminate innovation","They become too scientific","They prevent cooperation completely"],answer:0},
 {q:"The tone of the passage is:",options:["Balanced and analytical","Angry and emotional","Humorous and light-hearted","Highly technical"],answer:0},
 {q:"Which statement would the author most likely agree with?",options:["Competition alone guarantees discovery","Innovation often requires long-term support","Markets should be abolished","Research should always be profitable"],answer:1},
 {q:"Why are immediate market outcomes difficult measures for science?",options:["Scientific value may appear much later","Scientists ignore markets","Markets never change","Research avoids practical applications"],answer:0},
 {q:"What broader issue does the passage explore?",options:["How societies support innovation","How markets eliminate technology","Why research is unnecessary","How governments control science"],answer:0},
 {q:"What does the author say about markets?",options:["They are irrelevant","They are important but insufficient alone","They prevent cooperation","They always support patience"],answer:1},
 {q:"Which title best fits the passage?",options:["The End of Competition","Innovation Beyond Markets Alone","Why Science Rejects Profit","Technology Without Risk"],answer:1},
 {q:"What role does patience play in discovery according to the passage?",options:["It may be necessary for fundamental breakthroughs","It prevents experimentation","It weakens science","It guarantees profits"],answer:0},
 {q:"What does the passage imply about risk?",options:["Risk can be necessary for discovery","Risk should be eliminated","Risk only harms markets","Risk replaces cooperation"],answer:0},
 {q:"Why might cooperative structures matter?",options:["Because knowledge sharing can support innovation","Because competition is illegal","Because cooperation guarantees profit","Because markets cannot function"],answer:0},
 {q:"What criticism is directed at purely short-term thinking?",options:["It may undervalue long-term inquiry","It reduces public spending","It encourages experimentation","It increases patience"],answer:0},
 {q:"Which summary is most accurate?",options:["The passage rejects markets entirely","The passage argues that innovation depends on balancing competition with long-term collective support","The passage claims science should ignore economics","The passage says public investment always succeeds"],answer:1}
 ]
},

{
 title: "Passage 3",
 text: `Observers of modern media frequently worry that the abundance of information has made public understanding weaker rather than stronger. At first glance, this seems paradoxical. Never before have so many people possessed such immediate access to news, archives, commentary, and data. Yet critics argue that quantity alone does not guarantee comprehension.

 Information becomes meaningful only when individuals can evaluate context, credibility, and relevance. In environments saturated with rapid updates, attention is repeatedly fragmented. People may encounter large volumes of material without developing coherent frameworks through which to interpret it. Under such conditions, confidence can increase even while understanding remains shallow.

 The problem is intensified by systems that reward visibility and emotional reaction. Content that provokes outrage or affirmation often circulates more rapidly than material requiring patience or ambiguity. As a result, public discussion may drift toward certainty without reflection. The challenge, therefore, is not simply to provide access to information but to cultivate the habits of judgement necessary to navigate it responsibly.`,

 questions: [
 {q:"What is the central claim of the passage?",options:["Access to information automatically improves understanding","Large amounts of information do not necessarily create deeper understanding","Modern media should be abolished","Archives are no longer useful"],answer:1},
 {q:"Why does the author call the issue paradoxical?",options:["People have more information yet may understand less","Media no longer exists","Archives are disappearing","Technology has slowed communication"],answer:0},
 {q:"What is necessary for information to become meaningful?",options:["Faster technology","Context and evaluation","Public agreement","Emotional reaction"],answer:1},
 {q:"What effect can rapid updates have on attention?",options:["They strengthen concentration","They fragment attention","They eliminate emotion","They improve memory automatically"],answer:1},
 {q:"What may happen even while understanding remains shallow?",options:["Confidence may increase","Attention disappears entirely","Context becomes unnecessary","Archives lose value"],answer:0},
 {q:"Which systems intensify the problem according to the author?",options:["Systems rewarding visibility and emotional reaction","Libraries and schools","Scientific institutions","Transport systems"],answer:0},
 {q:"Why does emotionally charged content spread quickly?",options:["It often provokes outrage or affirmation","It is always more accurate","It contains more evidence","It avoids visibility"],answer:0},
 {q:"What danger does the passage identify in public discussion?",options:["Too much uncertainty","Certainty without reflection","Lack of emotional reaction","Too many archives"],answer:1},
 {q:"What broader skill does the author emphasise?",options:["Technical programming","Judgement","Memorisation","Competition"],answer:1},
 {q:"The tone of the passage is best described as:",options:["Critical and reflective","Comic and playful","Aggressive and hostile","Celebratory and optimistic"],answer:0},
 {q:"What does the passage imply about access to information?",options:["It is sufficient by itself","It must be paired with interpretive habits","It is unnecessary","It weakens all societies"],answer:1},
 {q:"What is meant by coherent frameworks?",options:["Ways of organising and interpreting information","Physical structures","Government regulations","Digital archives"],answer:0},
 {q:"Why is ambiguity mentioned?",options:["Some valuable material requires patience and nuanced thinking","Ambiguity prevents communication","All information is unclear","Media should avoid complexity"],answer:0},
 {q:"Which statement would the author most likely endorse?",options:["Understanding requires judgement as well as information","Visibility guarantees truth","Emotion should replace reflection","Archives are outdated"],answer:0},
 {q:"What role does credibility play in the passage?",options:["It helps determine whether information is trustworthy","It is irrelevant online","It only matters historically","It replaces context"],answer:0},
 {q:"Which title best fits the passage?",options:["The End of Public Discussion","Information, Attention, and Understanding","Why Archives Are Obsolete","Technology and Certainty"],answer:1},
 {q:"What criticism is directed at modern media systems?",options:["They often reward emotional visibility over careful reflection","They prevent all communication","They reduce information entirely","They avoid emotional reactions"],answer:0},
 {q:"What challenge does the author identify at the end?",options:["Providing fewer archives","Cultivating responsible judgement","Eliminating emotion","Reducing public discussion"],answer:1},
 {q:"What does the passage imply about understanding?",options:["It depends on interpretation and evaluation","It increases automatically with information quantity","It is identical to confidence","It cannot be improved"],answer:0},
 {q:"Which summary is most accurate?",options:["The passage argues modern media prevents all understanding","The passage argues that information abundance requires judgement and reflection to become meaningful","The passage rejects technology completely","The passage claims emotion is always harmful"],answer:1}
 ]
}

];

let p = 0, q = 0, answers = [];
let time = 4500;
let submitted = false;

function timer(){
  let m = Math.floor(time / 60);
  let s = time % 60;

  document.getElementById("timer").innerHTML =
    "<h3>Time: " + m + ":" + String(s).padStart(2,'0') + "</h3>";

  if(time > 0 && !submitted){
    time--;
    setTimeout(timer,1000);
  } else if(!submitted) {
    submitTest();
  }
}

function load(){
  document.getElementById("passage").innerHTML =
    "<h2>" + data[p].title + "</h2>" + data[p].text;
  show();
}

function show(){
  const item = data[p].questions[q];
  let html = "<p><strong>" + item.q + "</strong></p>";

  item.options.forEach((opt,i)=>{
    const checked = answers[p*20+q] === i ? "checked" : "";

    html += "<label><input type='radio' name='q' onclick='save(" + i + ")' " + checked + "> " + opt + "</label>";
  });

  html += "<p>Question " + (p*20+q+1) + " of 60</p>";

  document.getElementById("q").innerHTML = html;
}

function save(c){
  answers[p*20+q] = c;
}

function next(){
  if(q < 19) q++;
  else if(p < 2){
    p++;
    q = 0;
    load();
    return;
  }
  show();
}

function prev(){
  if(q > 0) q--;
  else if(p > 0){
    p--;
    q = 19;
    load();
    return;
  }
  show();
}

function submitTest(){
  submitted = true;
  let score = 0;
  let review = "";

  data.forEach((pass,pi)=>{
    pass.questions.forEach((qq,qi)=>{
      const idx = pi*20 + qi;
      const user = answers[idx];

      if(user === qq.answer) score++;

      review += "<p><strong>Q" + (idx+1) + ".</strong> " + qq.q + "<br>";
      review += "Your: <span class='" + (user===qq.answer ? "correct" : "wrong") + "'>" + (qq.options[user] || "None") + "</span><br>";
      review += "Correct: <span class='correct'>" + qq.options[qq.answer] + "</span></p>";
    });
  });

  document.getElementById("score").innerHTML = "<h2>Score: " + score + "/60</h2>";
  document.getElementById("review").innerHTML = review;

  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

timer();
load();

</script>
</body>
</html>
