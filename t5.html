<!DOCTYPE html>
<html>
<head>
<title> Reading Test - 11+</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f7fb; margin:0; padding:20px; }
.container { max-width:960px; margin:auto; background:white; padding:24px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.passage { background:#f8fafc; padding:18px; border-left:5px solid #0f172a; white-space:pre-line; line-height:1.7; margin-bottom:20px; }
button { background:#0f172a; color:white; padding:10px 14px; margin:5px; border:none; cursor:pointer; border-radius:8px; }
button:hover { opacity:0.92; }
.correct { color:green; }
.wrong { color:red; }
label { display:block; margin:8px 0; }
.meta { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
.small { color:#475569; font-size:14px; }
</style>
</head>
<body>

<div class="container">
  <h1>Reading Test (11+)</h1>
  <div class="meta">
    <div id="timer"></div>
    <div class="small">3 passages • 10 questions each • 30 questions total</div>
  </div>
  <div id="passage" class="passage"></div>
  <div id="q"></div>
  <button onclick="prev()">Previous</button>
  <button onclick="next()">Next</button>
  <button onclick="submitTest()">Submit</button>
  <div id="score"></div>
  <div id="review"></div>
</div>

<script>
const data = [

{
title: "Passage 1",
text: `For much of modern history, archives were regarded as passive repositories of human memory—places where documents were merely stored, catalogued, and preserved. More recently, however, historians have challenged this assumption, arguing that archives are not neutral spaces but institutions shaped by power, ideology, and selective omission.

What is preserved, and just as importantly what is excluded, often reflects the priorities of governments, religious authorities, colonial administrators, or private benefactors. As a result, archival records may project an appearance of comprehensiveness while in fact offering only a partial account of the past. Entire communities can remain marginalised within official records, not because they lacked history, but because their experiences were not considered worthy of preservation.

This recognition has led to a growing interest in alternative archives, including oral histories, community-led collections, and digital repositories created outside traditional institutions. Such initiatives do not simply supplement established archives; they also challenge the authority of conventional historical narratives by expanding the range of voices that can be heard.`,

questions: [
{q:"What is the main argument of the passage?",options:["Archives contain every important historical fact","Archives are neutral institutions","Archives are shaped by power and selection","Archives should be closed to the public"],answer:2},
{q:"According to the passage, traditional archives often appear to be:",options:["Incomplete and chaotic","Comprehensive and authoritative","Entirely fictional","Designed for entertainment"],answer:1},
{q:"Why might some communities be absent from official records?",options:["They had no history","Their experiences were not prioritised for preservation","They rejected literacy","They lived too recently"],answer:1},
{q:"What does the phrase 'selective omission' most nearly suggest?",options:["Accidental duplication","Deliberate or systematic exclusion","Improved organisation","Technological failure"],answer:1},
{q:"What function do alternative archives serve?",options:["They replace all written records","They destroy conventional narratives","They expand which voices are represented","They reduce public access to history"],answer:2},
{q:"The author’s tone toward traditional archives is best described as:",options:["Uncritical admiration","Measured scepticism","Humorous dismissal","Indifference"],answer:1},
{q:"Which of the following is implied about archives created by colonial administrators?",options:["They are always objective","They may reflect colonial priorities","They mainly preserve oral traditions","They are less influential than community archives"],answer:1},
{q:"What is the relationship between alternative archives and established archives?",options:["Alternative archives merely repeat them","Alternative archives can challenge their authority","Established archives absorb them completely","They are unrelated"],answer:1},
{q:"What does the passage suggest about historical narratives?",options:["They are fixed once written","They can be reshaped by whose records survive","They are independent of archives","They should exclude oral history"],answer:1},
{q:"Which title best fits the passage?",options:["The Decline of Written History","Why Archives Are Never Neutral","A Guide to Government Catalogues","Digital Storage and Data Loss"],answer:1}
]
},

{
title: "Passage 2",
text: `Economists once assumed that consumers act with stable preferences and sufficient information, weighing costs and benefits before reaching rational decisions. Behavioural economics has complicated that picture. It has shown that individuals are strongly influenced by context, framing, emotion, and mental shortcuts that can systematically distort judgement.

One widely cited example is the so-called default effect. When individuals are automatically enrolled in a retirement plan and must actively opt out, participation rates tend to be markedly higher than when enrolment requires active opt-in. The underlying options may be identical, yet the structure of the choice environment alters behaviour significantly.

For policymakers, this raises both practical and ethical questions. If subtle adjustments to presentation can improve public outcomes—such as higher savings rates or greater organ-donor participation—then such interventions may appear justified. Yet critics warn that influencing decisions without explicit awareness risks becoming manipulative, particularly when citizens do not fully understand how their behaviour is being guided.`,

questions: [
{q:"What assumption of classical economics is questioned in the passage?",options:["Consumers lack money","Consumers make perfectly rational decisions","Governments should regulate markets","Emotions improve judgement"],answer:1},
{q:"What does behavioural economics emphasise?",options:["Only income differences","The influence of context and cognitive shortcuts","The impossibility of public policy","That all decisions are irrational"],answer:1},
{q:"What is the default effect?",options:["People refuse all choices","Choice architecture can influence decisions through preset options","Consumers prefer expensive products","Citizens avoid retirement plans"],answer:1},
{q:"Why is retirement-plan participation higher under automatic enrolment?",options:["The plans are cheaper","People are more likely to remain with the preset option","Employers force participation","The benefits are explained better"],answer:1},
{q:"What ethical concern does the author mention?",options:["Policies are too expensive","Citizens may be influenced without full awareness","People dislike saving money","Defaults always reduce freedom"],answer:1},
{q:"What is implied about 'choice architecture'?",options:["It has no measurable effect","It can shape outcomes without changing core options","It applies only to advertising","It eliminates individual responsibility"],answer:1},
{q:"Which of the following best describes the author’s view of behavioural interventions?",options:["Entirely beneficial","Entirely manipulative","Potentially useful but ethically complex","Scientifically unproven"],answer:2},
{q:"The phrase 'markedly higher' is closest in meaning to:",options:["Slightly lower","Substantially greater","Unexpectedly unstable","Legally required"],answer:1},
{q:"What is the best summary of the final paragraph?",options:["Policymakers should never influence behaviour","Behavioural tools may improve outcomes but also raise concerns about manipulation","Retirement plans are the best policy tool","Citizens always understand how choices are framed"],answer:1},
{q:"Which title best matches the passage?",options:["Why Consumers Never Save","Rational Choice in Perfect Markets","Behavioural Economics and the Ethics of Influence","The End of Public Policy"],answer:2}
]
},

{
title: "Passage 3",
text: `Scientific models are often misunderstood by the public as failed attempts at certainty whenever they are revised. In practice, however, revision is not evidence of weakness but a fundamental feature of scientific progress. Models are simplified representations of reality, constructed to explain observed patterns and generate predictions. Their value lies not in permanence but in usefulness, testability, and openness to correction.

This is particularly evident in fields such as climate science, epidemiology, and astronomy, where new data can refine earlier assumptions or reveal previously unrecognised variables. A revised model may therefore indicate not that scientists were careless, but that the process of inquiry is functioning as intended.

The difficulty is communicative as much as scientific. Public audiences often encounter changing projections and interpret them as contradiction, whereas scientists interpret them as calibration. Bridging this gap requires not only clearer explanation of uncertainty, but also broader public understanding that uncertainty is not the opposite of knowledge. Rather, it is one of the conditions under which reliable knowledge is produced.`,

questions: [
{q:"What is the main purpose of the passage?",options:["To argue that scientific models are unreliable","To explain why revision is a normal part of science","To criticise public education","To prove that predictions should be avoided"],answer:1},
{q:"According to the author, the value of scientific models lies in their:",options:["Permanence","Simplicity and resistance to criticism","Usefulness and openness to correction","Ability to avoid uncertainty"],answer:2},
{q:"What does model revision usually indicate?",options:["Scientific failure","Carelessness by researchers","The inquiry process is working properly","Political interference"],answer:2},
{q:"Why are climate science and epidemiology mentioned?",options:["They are less accurate than other sciences","They frequently rely on data that can refine existing models","They reject prediction entirely","They are unpopular with the public"],answer:1},
{q:"What communicative problem does the passage identify?",options:["Scientists publish too slowly","The public often interprets revised projections as contradiction","Scientists refuse to explain data","The media never reports uncertainty"],answer:1},
{q:"What does the word 'calibration' most nearly mean in this context?",options:["Deception","Adjustment for greater accuracy","Loss of evidence","Public confusion"],answer:1},
{q:"Which statement would the author most likely agree with?",options:["Uncertainty means scientists do not know anything","Reliable knowledge can emerge under conditions of uncertainty","Models should never be changed once published","Public misunderstanding makes science impossible"],answer:1},
{q:"The author’s tone is best described as:",options:["Defensive but explanatory","Mocking and dismissive","Casual and anecdotal","Alarmist"],answer:0},
{q:"What is implied about public understanding of science?",options:["It often expects certainty where science offers revision and refinement","It is generally stronger than scientists assume","It has no effect on policy debates","It improves when models remain unchanged"],answer:0},
{q:"Which title best captures the passage?",options:["Why Scientific Uncertainty Is a Sign of Failure","Models, Revision, and the Nature of Scientific Knowledge","The Dangers of Prediction in Modern Science","How the Public Rejected Astronomy"],answer:1}
]
}

];

let p = 0, q = 0, answers = [];
let time = 2100;

function timer(){
  let m = Math.floor(time / 60);
  let s = time % 60;
  document.getElementById("timer").innerHTML = "<h3>Time: " + m + ":" + String(s).padStart(2,'0') + "</h3>";
  if(time > 0){
    time--;
    setTimeout(timer, 1000);
  } else {
    submitTest();
  }
}

function load(){
  document.getElementById("passage").innerHTML = "<h2>" + data[p].title + "</h2>" + data[p].text;
  show();
}

function show(){
  let item = data[p].questions[q];
  let html = "<p><strong>" + item.q + "</strong></p>";
  item.options.forEach((opt, i) => {
    const checked = answers[p*10+q] === i ? "checked" : "";
    html += "<label><input type='radio' name='q' onclick='save(" + i + ")' " + checked + "> " + opt + "</label>";
  });
  html += "<p>Question " + (p*10 + q + 1) + " of 30</p>";
  document.getElementById("q").innerHTML = html;
}

function save(c){
  answers[p*10 + q] = c;
}

function next(){
  if(q < 9) q++;
  else if(p < 2){ p++; q = 0; load(); return; }
  show();
}

function prev(){
  if(q > 0) q--;
  else if(p > 0){ p--; q = 9; load(); return; }
  show();
}

function submitTest(){
  let score = 0, review = "";
  data.forEach((pass, pi) => {
    pass.questions.forEach((qq, qi) => {
      let idx = pi*10 + qi;
      let user = answers[idx];
      if(user === qq.answer) score++;
      review += "<p>" + qq.q + "<br>";
      review += "Your: <span class='" + (user===qq.answer ? "correct" : "wrong") + "'>" + (qq.options[user] || "None") + "</span><br>";
      review += "Correct: <span class='correct'>" + qq.options[qq.answer] + "</span></p>";
    });
  });
  document.getElementById("score").innerHTML = "<h2>Score: " + score + "/30</h2>";
  document.getElementById("review").innerHTML = review;
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

timer();
load();
</script>
</body>
</html>
